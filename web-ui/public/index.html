<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>PI Agent</title><link rel="stylesheet" href="style.css?v=20"></head><body><div id="app"><aside id="sidebar">  <div id="sidebar-header">    <div class="logo">      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2" fill="none"/>        <text x="16" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="currentColor">&pi;</text>      </svg>      <span>PI Agent</span>    </div>  </div>  <div class="sidebar-section">    <div class="section-label">模型配置</div>    <div class="field"><select id="provider-select">      <option value="anthropic">Anthropic</option>      <option value="openai">OpenAI</option>      <option value="google">Google Gemini</option>      <option value="deepseek">DeepSeek</option>      <option value="groq">Groq</option>      <option value="xai">xAI Grok</option>      <option value="mistral">Mistral</option>      <option value="openrouter">OpenRouter</option>      <option value="github">GitHub Copilot</option>      <option value="azure">Azure OpenAI</option>    </select></div>    <div class="field">      <div id="model-ids-container">        <div class="model-id-row">          <input class="model-id-field" placeholder="模型 ID（如 claude-sonnet-4）">          <button class="remove-model-btn" title="删除">-</button>        </div>      </div>      <button id="add-model-btn" class="btn btn-sm" style="margin-top:4px">+ 添加模型</button>    </div>    <div class="field"><input id="api-key-input" type="password" placeholder="API 密钥"></div>    <div class="field"><input id="base-url-input" placeholder="基础 URL（可选）"></div>    <div class="field"><textarea id="system-prompt-input" placeholder="系统提示词（可选）" rows="2"></textarea></div>    <button id="apply-btn" class="btn btn-accent">应用配置</button>    <div id="config-msg" class="config-msg"></div>  </div>  <div class="sidebar-section">    <div class="section-label">会话</div>    <button id="new-session-btn" class="btn">新建会话</button>    <button id="session-stats-btn" class="btn" style="margin-top:4px">会话统计</button>    <div style="display:flex;gap:4px;margin-top:4px">      <input id="resume-input" placeholder="输入会话 ID 恢复..." style="flex:1">      <button id="resume-btn" class="btn btn-sm">恢复</button>    </div>    <button id="export-btn" class="btn btn-sm" style="width:100%;margin-top:4px">导出 HTML</button>  </div>  <div class="sidebar-section sidebar-section-grow">    <div class="section-label">最近会话</div>    <div id="thread-list" class="thread-list"><div class="thread-empty">暂无会话</div></div>  </div>  <div class="sidebar-section">    <div class="section-label">设置</div>    <div class="toggle-row"><span>工具过滤</span><div id="tools-filter-toggle" class="toggle"></div></div>    <div id="tools-filter-group" class="hidden" style="margin-top:4px">      <input id="tools-allow" placeholder="允许的工具（逗号分隔）">      <input id="tools-deny" placeholder="禁用的工具（逗号分隔）" style="margin-top:3px">    </div>    <div class="toggle-row"><span>自动压缩</span><div id="auto-compact-toggle" class="toggle active"></div></div>    <div class="toggle-row"><span>自动重试</span><div id="auto-retry-toggle" class="toggle active"></div></div>    <div class="toggle-row"><span>主题</span>      <div class="theme-switch">        <button data-theme="light" class="theme-opt">浅色</button>        <button data-theme="dark" class="theme-opt" data-active>深色</button>        <button data-theme="system" class="theme-opt">系统</button>      </div>    </div>  </div></aside><div id="main">  <header id="header">    <div class="header-left">      <span id="status-dot" class="status-dot idle"></span>      <span id="status-text">就绪</span>      <span id="session-name" class="session-name"></span>    </div>    <div class="header-center">      <div class="model-badge"><span id="header-model">未配置</span><span id="header-thinking" class="thinking-badge">中</span></div>    </div>    <div class="header-right">      <button id="clear-btn" class="btn btn-sm">清空</button>      <button id="abort-btn" class="btn btn-sm btn-danger" disabled>终止</button>    </div>  </header>  <div id="messages">    <div class="welcome">      <div class="welcome-icon"><svg width="48" height="48" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="16" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="currentColor">&pi;</text></svg></div>      <h2>PI Agent</h2>      <p>配置模型后开始对话</p>    </div>  </div>  <div id="input-area">    <div id="slash-menu" class="slash-menu"><div id="slash-list" class="slash-list"></div></div>    <div id="input-row">      <textarea id="input-box" rows="1" placeholder="输入消息...（Enter 发送，Shift+Enter 换行）"></textarea>      <button id="send-btn" title="发送"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>    </div>    <div id="quick-controls">      <select id="model-select" class="quick-select"><option value="">切换模型...</option></select>      <select id="thinking-select" class="quick-select">        <option value="off">关闭</option><option value="minimal">极简</option><option value="low">低</option><option value="medium" selected>中</option><option value="high">高</option><option value="xhigh">极高</option>      </select>      <span id="workspace-display" class="quick-select workspace-display" title="点击设置工作区">工作区: <b id="workspace-path">...</b></span><input type="file" id="workspace-picker" webkitdirectory directory nwdirectory style="display:none">    </div>  </div>  <footer id="status-bar">    <span>模型: <b id="status-model">-</b></span>    <span>思考: <b id="status-thinking">-</b></span>    <span>消息: <b id="status-msgs">0</b></span>    <span id="status-tokens" class="hidden">Token: <b id="status-token-val">0</b></span>    <span id="status-cost" class="hidden">费用: <b id="status-cost-val">$0</b></span>    <span id="status-context" class="hidden">上下文: <b id="status-context-val">0%</b></span>  </footer></div></div><div id="overlay"></div><div id="stats-modal" class="modal"><div class="modal-header"><h3>会话统计</h3><button id="stats-close" class="modal-close">&times;</button></div><div id="stats-content" class="modal-body"></div></div><div id="ext-modal" class="modal"><div class="modal-header"><h3 id="ext-title"></h3><button class="modal-close" onclick="closeExtUI()">&times;</button></div><div class="modal-body"><p id="ext-message"></p><div id="ext-content"></div></div><div id="ext-actions" class="modal-actions"></div></div><script src="app.js?v=20"></script></body></html>
